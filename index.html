<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#1B3A6B"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Psiquilibrium"/>
<meta name="mobile-web-app-capable" content="yes"/>
<link rel="manifest" href="manifest.webmanifest"/>
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png"/>
<title>Psiquilibrium</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" onerror="this.onerror=null;this.src='https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js';"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" onerror="this.onerror=null;this.src='https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js';"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js" onerror="this.onerror=null;this.src='https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js';"></script>
<script>
window.addEventListener("error",function(e){
  var root=document.getElementById("root");
  if(root&&root.textContent.indexOf("Cargando Psiquilibrium")!==-1){
    root.innerHTML='<div style="padding:1rem;color:#c0392b;font-family:system-ui,sans-serif;">No se pudo cargar la app. Recarga la página o revisa la conexión.</div>';
  }
});
window.addEventListener("load",function(){
  setTimeout(function(){
    var root=document.getElementById("root");
    if(root&&root.textContent.indexOf("Cargando Psiquilibrium")!==-1&&(!window.React||!window.ReactDOM||!window.Babel)){
      root.innerHTML='<div style="padding:1rem;color:#c0392b;font-family:system-ui,sans-serif;">No se pudieron cargar los componentes de la app. Revisa la conexión e intenta recargar.</div>';
    }
  },6000);
});
</script>
<style>
:root{
  --navy:#1B3A6B;--cyan:#4DC8E8;--cyan-light:#e8f7fc;
  --bg:#f0f7fa;--white:#fff;--text:#1B3A6B;--muted:#5a7a9a;
  --border:#c5dce8;--danger:#c0392b;--danger-bg:#fdf0ee;
  --success:#0f6e56;--success-bg:#eafaf3;
  --blocked:#fbf6e8;--blocked-border:#c9ad58;
  --cancelled:#f0f0f0;--cancelled-text:#999;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,sans-serif;font-size:15px;background:var(--bg);color:var(--text);min-height:100vh;}
#root{max-width:1400px;margin:0 auto;padding:1rem;}
input,select{font-family:inherit;font-size:14px;padding:8px 10px;border:1px solid var(--border);border-radius:8px;width:100%;background:var(--white);color:var(--text);outline:none;}
input:focus,select:focus{border-color:var(--cyan);box-shadow:0 0 0 2px #4DC8E833;}
button{font-family:inherit;font-size:13px;padding:7px 14px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--navy);cursor:pointer;transition:background 0.15s;}
button:hover{background:var(--cyan-light);}
button:disabled{opacity:0.5;cursor:default;}
.drop-target{outline:2px dashed var(--cyan)!important;background:var(--cyan-light)!important;}
.drop-target-blocked{outline:2px dashed var(--blocked-border)!important;background:var(--blocked)!important;}
.app-topbar{position:sticky;top:0;z-index:20;margin:-1rem -1rem 16px;padding:12px 1rem;background:rgba(240,247,250,0.96);border-bottom:1px solid var(--border);backdrop-filter:blur(8px);}
.topbar-row{display:flex;align-items:center;justify-content:space-between;gap:12px;}
.brand-group{display:flex;align-items:center;gap:10px;min-width:220px;}
.brand-mark{width:24px;height:24px;border:2px solid var(--cyan);border-radius:5px;transform:rotate(45deg);flex-shrink:0;background:#fff;}
.brand-title{font-weight:800;font-size:17px;color:var(--navy);line-height:1;}
.user-pill{display:flex;align-items:center;gap:7px;font-size:12px;background:#fff;border:1px solid var(--border);padding:5px 9px;border-radius:999px;color:var(--navy);box-shadow:0 1px 2px rgba(27,58,107,0.06);}
.user-dot{width:8px;height:8px;border-radius:50%;background:var(--success);flex-shrink:0;}
.user-role{text-transform:capitalize;color:var(--muted);font-weight:600;}
.tabs{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end;align-items:center;}
.tab-button{font-size:12px;border-radius:999px;background:#fff;border-color:var(--border);color:var(--navy);font-weight:600;}
.tab-button.active{background:var(--navy);border-color:var(--navy);color:#fff;box-shadow:0 2px 6px rgba(27,58,107,0.18);}
.icon-button{min-width:36px;padding:7px 10px;border-radius:999px;background:#fff;}
.notice{font-size:13px;margin-bottom:10px;padding:10px 12px;border-radius:10px;border:1px solid var(--border);display:flex;justify-content:space-between;gap:10px;align-items:center;line-height:1.35;}
.notice-danger{background:var(--danger-bg);border-color:#f5c6c0;color:var(--danger);}
.notice-info{background:var(--cyan-light);border-color:var(--cyan);color:var(--navy);}
.floating-notice{position:fixed;z-index:999;padding:10px 14px;border-radius:10px;font-size:13px;border:1px solid var(--border);box-shadow:0 8px 24px rgba(27,58,107,0.14);display:flex;gap:10px;align-items:center;}
.toast-notice{top:16px;right:16px;}
.clipboard-notice{top:16px;left:50%;transform:translateX(-50%);}
.section-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;flex-wrap:wrap;gap:10px;}
.section-title{font-weight:700;font-size:16px;color:var(--navy);line-height:1.2;}
.section-subtitle{font-size:12px;color:var(--muted);margin-top:3px;}
.toolbar-actions{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.list-card{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:0.85rem 1rem;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;gap:12px;box-shadow:0 1px 2px rgba(27,58,107,0.04);}
.list-card.cancelled{background:#fafafa;}
.list-card.syncing{opacity:0.58;}
.list-main{min-width:0;flex:1;}
.list-title{font-weight:700;font-size:13px;color:var(--navy);line-height:1.3;overflow-wrap:anywhere;}
.list-title.cancelled{text-decoration:line-through;color:var(--cancelled-text);}
.list-meta{font-size:12px;color:var(--muted);line-height:1.45;margin-top:3px;overflow-wrap:anywhere;}
.list-actions{display:flex;gap:6px;flex-shrink:0;align-items:center;flex-wrap:wrap;justify-content:flex-end;}
.status-chip{display:inline-flex;align-items:center;border-radius:999px;padding:3px 8px;font-size:11px;font-weight:700;white-space:nowrap;}
.chip-success{background:var(--success-bg);color:var(--success);}
.chip-danger{background:var(--danger-bg);color:var(--danger);}
.chip-info{background:var(--cyan-light);color:var(--navy);}
.chip-muted{background:#f5f7f8;color:var(--muted);}
.filters-panel{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:0.85rem;margin-bottom:12px;}
.metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:12px;}
.metric-card{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:0.8rem 0.9rem;}
.metric-value{font-size:24px;font-weight:800;line-height:1.1;margin-top:3px;}
.agenda-table{background:var(--white);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.agenda-head-today{box-shadow:inset 0 3px 0 var(--cyan);}
.agenda-cell{position:relative;transition:background 0.12s,border-color 0.12s,box-shadow 0.12s,transform 0.12s;}
.agenda-cell:hover{box-shadow:inset 0 0 0 2px var(--cyan);}
.agenda-cell.available:hover{background:#f7fcfe!important;}
.agenda-cell:active{transform:scale(0.98);}
.agenda-cell.available{background:#fff;}
.agenda-cell.reserved{box-shadow:inset 0 0 0 1px rgba(27,58,107,0.08);}
.agenda-cell.cancelled{background:repeating-linear-gradient(135deg,#f4f4f4 0,#f4f4f4 6px,#ececec 6px,#ececec 12px)!important;}
.agenda-cell.blocked{background:repeating-linear-gradient(135deg,rgba(201,173,88,0.12) 0,rgba(201,173,88,0.12) 7px,rgba(251,246,232,0.52) 7px,rgba(251,246,232,0.52) 15px)!important;box-shadow:inset 0 0 0 1px rgba(201,173,88,0.22);}
.agenda-cell.syncing::after{content:"";position:absolute;inset:3px;border-radius:6px;border:1px dashed var(--muted);pointer-events:none;}
.agenda-cell.unavailable{background:#eef3f6!important;cursor:not-allowed;}
.agenda-name{display:inline-block;max-width:100%;padding:1px 5px;border-radius:5px;background:rgba(255,255,255,0.72);line-height:1.2;color:var(--navy);font-weight:800;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.agenda-name.cancelled{color:var(--cancelled-text);text-decoration:line-through;background:rgba(255,255,255,0.55);}
.agenda-block-label{display:inline-block;max-width:100%;padding:1px 5px;border-radius:5px;background:rgba(255,255,255,0.58);color:#7d6a3d;font-weight:700;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;opacity:0.82;}
.agenda-sync-label{margin-top:2px;font-size:9px;line-height:11px;color:var(--muted);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mobile-day-title{font-weight:800;font-size:16px;color:var(--navy);text-align:center;line-height:19px;}
.mobile-day-button{font-size:12px;padding:8px 6px;min-height:46px;border-radius:10px;font-weight:600;background:#fff;color:var(--navy);border:1px solid var(--border);}
.mobile-day-button.selected{background:var(--navy);color:#fff;border-color:var(--navy);box-shadow:0 2px 8px rgba(27,58,107,0.2);}
.mobile-day-button.today:not(.selected){background:var(--cyan-light);border-color:var(--cyan);}
@media(max-width:720px){
  #root{padding:0.75rem;}
  button{min-height:42px;padding:9px 12px;}
  input,select{min-height:42px;font-size:16px;}
  .app-topbar{margin:-0.75rem -0.75rem 14px;padding:10px 0.75rem;}
  .topbar-row{align-items:flex-start;flex-direction:column;}
  .brand-group{width:100%;min-width:0;justify-content:space-between;align-items:flex-start;}
  .brand-title{font-size:16px;}
  .user-pill{max-width:100%;font-size:11px;}
  .tabs{width:100%;flex-wrap:nowrap;overflow-x:auto;justify-content:flex-start;padding-bottom:4px;-webkit-overflow-scrolling:touch;}
  .tab-button{flex:0 0 auto;}
  .notice{align-items:flex-start;}
  .floating-notice{left:12px;right:12px;transform:none;justify-content:space-between;}
  .toast-notice{top:10px;}
  .clipboard-notice{top:64px;}
  .section-head{align-items:stretch;}
  .toolbar-actions{width:100%;}
  .toolbar-actions button{flex:1 1 auto;}
  .list-card{align-items:flex-start;flex-direction:column;padding:0.85rem;}
  .list-actions{width:100%;justify-content:flex-start;}
  .list-actions button{flex:1 1 auto;}
  .agenda-cell{min-height:48px;}
  .agenda-name{font-size:10px;padding:2px 5px;}
  .agenda-block-label{font-size:10px;padding:2px 5px;}
}
</style>
</head>
<body>
<div id="root"><div style="padding:1rem;color:#1B3A6B;font-family:system-ui,sans-serif;">Cargando Psiquilibrium...</div></div>
<script type="text/babel">
const{useState,useEffect,useCallback,useMemo,useRef}=React;

const SCRIPT_URL="https://script.google.com/macros/s/AKfycbwtbD8VGPkhFg0nMuRW2uvIjLnLlVXclYvqRlyqgYpz_kKNLxSX2FrYCdmwW8mQhudv/exec";
const CONS=["Consultorio 1","Consultorio 2","Consultorio 3","Consultorio 4"];
const CONS_COLORS=["#1B3A6B","#0f6e56","#9B3FA0","#b07800"];
const DIAS=["Lun","Mar","Mié","Jue","Vie","Sáb"];
const DIAS_FULL=["Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
const USER_COLORS=["#1B3A6B","#2a7ab5","#0f6e56","#9B3FA0","#b07800","#c05000","#1a6b5a","#8B2252","#3a6b1B","#005a8b","#6b3a1B","#1B5a6b","#5a1B6b","#6b5a1B","#2a5298","#4a7820"];
const FRANJAS=Array.from({length:20},(_,i)=>{const h=Math.floor(8+i/2),m=i%2===0?"00":"30";return `${String(h).padStart(2,"0")}:${m}`;});
const SESSION_KEY="psiq_v6";
const TODAS_FILTROS_KEY="psiq_todas_filtros_v1";
const DEFAULT_TODAS_FILTROS={profesional:"todos",consultorio:"todos",estado:"todos",texto:"",alcance:"semana",desde:"",hasta:""};

function getWeekDates(base){
  const d=new Date(base),diff=d.getDay()===0?-6:1-d.getDay(),mon=new Date(d);
  mon.setDate(d.getDate()+diff);
  mon.setHours(0,0,0,0);
  return Array.from({length:6},(_,i)=>{const nd=new Date(mon);nd.setDate(mon.getDate()+i);return nd;});
}
function fmt(d){return `${String(d.getDate()).padStart(2,"0")}/${String(d.getMonth()+1).padStart(2,"0")}`;}
function dateKey(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}
async function api(params){
  const u=new URL(SCRIPT_URL);
  Object.entries(params).forEach(([k,v])=>u.searchParams.set(k,String(v)));
  const res=await fetch(u.toString(),{redirect:"follow"});
  return res.json();
}

function App(){
  const [screen,setScreen]=useState("login");
  const [currentUser,setCurrentUser]=useState(null);
  const [token,setToken]=useState(null);
  const [reservas,setReservas]=useState([]);
  const [bloqueos,setBloqueos]=useState([]);
  const [allUsers,setAllUsers]=useState([]);
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState(null);
  const [toast,setToast]=useState(null);
  const [weekBase,setWeekBase]=useState(new Date());
  const [selCons,setSelCons]=useState(0);
  const [view,setView]=useState("consolidada");
  const [modal,setModal]=useState(null);
  const [bloqueoModal,setBloqueoModal]=useState(null);
  const [diagnostico,setDiagnostico]=useState(null);
  const [auditoria,setAuditoria]=useState([]);
  const [auditoriaLoading,setAuditoriaLoading]=useState(false);
  const [auditoriaError,setAuditoriaError]=useState(null);
  const [reporte,setReporte]=useState(null);
  const [reporteLoading,setReporteLoading]=useState(false);
  const [reporteError,setReporteError]=useState(null);
  const [form,setForm]=useState({nota:"",franjaInicio:"0",franjaFin:"2",profesionalId:""});
  const [bForm,setBForm]=useState({nota:"",franjaInicio:"0",franjaFin:"2",repeticion:"ninguna",consultorio:"0"});
  const [todasFiltros,setTodasFiltros]=useState(()=>{
    try{return {...DEFAULT_TODAS_FILTROS,...JSON.parse(sessionStorage.getItem(TODAS_FILTROS_KEY)||"{}")};}
    catch{return DEFAULT_TODAS_FILTROS;}
  });
  const [actividadFiltros,setActividadFiltros]=useState({tipo:"todos",accion:"todas",periodo:"7"});
  const [reporteFiltros,setReporteFiltros]=useState({periodo:"semana",desde:"",hasta:"",profesional:"todos"});
  const [conflict,setConflict]=useState(false);
  const [loginForm,setLoginForm]=useState({userId:"",password:""});
  const [dragItem,setDragItem]=useState(null); // {type:"reserva"|"bloqueo", id}
  const [clipboard,setClipboard]=useState(null); // {type:"reserva"|"bloqueo", item}
  const [isMobile,setIsMobile]=useState(()=>window.innerWidth<=720);
  const [mobileDia,setMobileDia]=useState(()=>Math.min(Math.max((new Date().getDay()||1)-1,0),5));
  const pollRef=useRef(null);
  const fetchInFlightKeyRef=useRef(null);
  const latestFetchKeyRef=useRef(null);
  const agendaVersionRef=useRef({key:null,version:null});
  const dataVersionRef=useRef(0);
  const pendingMoveIdsRef=useRef(new Set());
  const [syncingById,setSyncingById]=useState({});
  const pasteInFlightRef=useRef(false);
  const formActionInFlightRef=useRef(false);

  useEffect(()=>{
    const onResize=()=>setIsMobile(window.innerWidth<=720);
    window.addEventListener("resize",onResize);
    return()=>window.removeEventListener("resize",onResize);
  },[]);

  const weekDates=getWeekDates(weekBase);
  const weekStart=dateKey(weekDates[0]);
  const weekEnd=dateKey(weekDates[5]);
  const isAdmin=currentUser?.rol==="admin";
  const isAssistant=currentUser?.rol==="asistente";
  const isSocio=currentUser?.rol==="socio"||isAdmin;
  const canOperateReservations=isAdmin||isAssistant;
  const canCreateForOthers=isAdmin||isAssistant;
  const canManageBlocks=isAdmin||isAssistant;
  const canDeleteCancelledReservations=isAdmin||isAssistant;
  const canViewAllReservations=isSocio||isAssistant;
  const canViewActivity=isSocio||isAssistant;
  const canCreateBackup=isSocio;
  const canViewReports=isSocio;

  const showToast=(msg,type="success")=>{setToast({msg,type});setTimeout(()=>setToast(null),3000);};
  const userMeta=useMemo(()=>{
    const names=new Map(),colors=new Map();
    allUsers.forEach((u,i)=>{names.set(u.id,u.nombre);colors.set(u.id,USER_COLORS[i%USER_COLORS.length]);});
    return {names,colors};
  },[allUsers]);
  const getUserColor=uid=>userMeta.colors.get(uid)||USER_COLORS[0];
  const getUserName=uid=>userMeta.names.get(uid)||uid;

  const slotKey=(cons,fecha,fi)=>`${cons}|${fecha}|${fi}`;
  const agendaIndex=useMemo(()=>{
    const reservaSlots=new Map();
    const bloqueoSlots=new Map();
    const weekKeys=weekDates.map(dateKey);
    const weekSet=new Set(weekKeys);
    const weekDayByFecha=new Map(weekDates.map(d=>[dateKey(d),new Date(d.getFullYear(),d.getMonth(),d.getDate()).getDay()]));

    reservas.forEach(r=>{
      if(r.fecha<weekStart||r.fecha>weekEnd)return;
      const slots=Math.ceil(Number(r.duracion||0)/30);
      for(let i=0;i<slots;i++) reservaSlots.set(slotKey(r.consultorio,r.fecha,r.franja+i),r);
    });

    bloqueos.forEach(b=>{
      const slots=Math.ceil(Number(b.duracion||0)/30);
      const addBlock=fecha=>{
        for(let i=0;i<slots;i++){
          if(b.consultorio==="todos"){
            CONS.forEach((_,ci)=>bloqueoSlots.set(slotKey(ci,fecha,b.franja+i),b));
          }else{
            bloqueoSlots.set(slotKey(b.consultorio,fecha,b.franja+i),b);
          }
        }
      };
      if(weekSet.has(b.fecha)) addBlock(b.fecha);
      if(b.repeticion==="semanal"){
        const [by,bm,bd]=b.fecha.split("-").map(Number);
        const blockDay=new Date(by,bm-1,bd).getDay();
        weekKeys.forEach(fecha=>{if(weekDayByFecha.get(fecha)===blockDay)addBlock(fecha);});
      }
    });
    return {reservaSlots,bloqueoSlots};
  },[reservas,bloqueos,weekStart,weekEnd]);

  useEffect(()=>{
    const saved=sessionStorage.getItem(SESSION_KEY);
    if(saved){try{const{user,tok,users}=JSON.parse(saved);setCurrentUser(user);setToken(tok);setAllUsers(users||[]);setScreen("app");}catch{}}
  },[]);

  useEffect(()=>{
    try{sessionStorage.setItem(TODAS_FILTROS_KEY,JSON.stringify(todasFiltros));}catch{}
  },[todasFiltros]);

  const fetchAll=useCallback(async(tkn)=>{
    const activeToken=tkn||token;
    const needsFullData=view==="mis reservas"||view==="todas";
    const fetchKey=`${activeToken}|${needsFullData?"full":`${weekStart}|${weekEnd}`}`;
    if(fetchInFlightKeyRef.current===fetchKey)return;
    fetchInFlightKeyRef.current=fetchKey;
    latestFetchKeyRef.current=fetchKey;
    const dataVersionAtStart=dataVersionRef.current;
    try{
      if(!needsFullData){
        const d=await api({action:"getAgenda",token:activeToken,desde:weekStart,hasta:weekEnd});
        if(latestFetchKeyRef.current!==fetchKey)return;
        if(dataVersionRef.current!==dataVersionAtStart)return;
        if(d.ok){
          setReservas(normalizeReservas(d.reservas));
          setBloqueos(normalizeBloqueos(d.bloqueos));
          agendaVersionRef.current={key:fetchKey,version:d.version||null};
          return;
        }
      }
      const [r,b]=await Promise.all([api({action:"getReservas",token:activeToken}),api({action:"getBloqueos",token:activeToken})]);
      if(latestFetchKeyRef.current!==fetchKey)return;
      if(dataVersionRef.current!==dataVersionAtStart)return;
      if(r.ok) setReservas(normalizeReservas(r.reservas));
      if(b.ok) setBloqueos(normalizeBloqueos(b.bloqueos));
      agendaVersionRef.current={key:fetchKey,version:null};
    }catch{}finally{if(fetchInFlightKeyRef.current===fetchKey)fetchInFlightKeyRef.current=null;}
  },[token,weekStart,weekEnd,view]);

  const refreshIfNeeded=useCallback(async(tkn)=>{
    const activeToken=tkn||token;
    const needsFullData=view==="mis reservas"||view==="todas";
    if(needsFullData){fetchAll(activeToken);return;}
    const fetchKey=`${activeToken}|${weekStart}|${weekEnd}`;
    try{
      const d=await api({action:"getAgendaVersion",token:activeToken,desde:weekStart,hasta:weekEnd});
      if(!d.ok){fetchAll(activeToken);return;}
      if(agendaVersionRef.current.key!==fetchKey||agendaVersionRef.current.version!==d.version){
        fetchAll(activeToken);
      }
    }catch{fetchAll(activeToken);}
  },[token,weekStart,weekEnd,view,fetchAll]);

  const fetchAuditoria=useCallback(async()=>{
    if(!token)return;
    setAuditoriaLoading(true);
    setAuditoriaError(null);
    try{
      const d=await api({action:"getAuditoria",token,limit:100});
      if(d.ok)setAuditoria(d.eventos||[]);
      else setAuditoriaError(d.error||"No se pudo cargar actividad.");
    }catch{setAuditoriaError("Error al cargar actividad.");}
    setAuditoriaLoading(false);

  const isTempId=id=>String(id||"").startsWith("temp_");

    const key=String(id||"");

  };
  const getSyncLabel=id=>{
    const key=String(id||"");

  };
  const beginSync=(id,label="Guardando...")=>{
    const key=String(id);
    pendingMoveIdsRef.current.add(key);
    setSyncingById(prev=>({...prev,[key]:label}));
  };
  const endSync=id=>{
    const key=String(id);
    pendingMoveIdsRef.current.delete(key);

  const handleDelete=async(id)=>{

  // Drag & drop
  const onDragStart=(e,type,id)=>{
    if(isSyncing(id)){e.preventDefault();setError("Ese elemento aún se está guardando.");return;}
    setDragItem({type,id});e.dataTransfer.effectAllowed="move";
  };
  const onDragOver=e=>{e.preventDefault();const cls=dragItem?.type==="bloqueo"?"drop-target-blocked":"drop-target";e.currentTarget.classList.add(cls);};
  const onDragLeave=e=>{e.currentTarget.classList.remove("drop-target","drop-target-blocked");};
  const onDrop=async(e,cons,fecha,fi)=>{
    e.preventDefault();e.currentTarget.classList.remove("drop-target","drop-target-blocked");
    if(!dragItem)return;
    if(isSyncing(dragItem.id)){setError("Este elemento aún se está sincronizando. Intenta de nuevo en unos segundos.");setDragItem(null);fetchAll(token);return;}
    beginSync(dragItem.id,"Moviendo...");
    if(dragItem.type==="reserva"){
      const r=reservas.find(x=>x.id===dragItem.id);
      if(!r||r.consultorio===cons&&r.fecha===fecha&&r.franja===fi){endSync(dragItem.id);setDragItem(null);return;}
      if(isBlocked(cons,fecha,fi)){setError("Franja bloqueada");endSync(dragItem.id);setDragItem(null);return;}
      if(hasConflictLocal(cons,fecha,fi,r.duracion,r.id)){setError("Conflicto de horario");endSync(dragItem.id);setDragItem(null);return;}
      const previous=r;
      // Optimista
      markLocalChange();
      setReservas(prev=>prev.map(x=>x.id===dragItem.id?{...x,consultorio:cons,fecha,franja:fi}:x));
      showToast("Reserva movida");
      try{
        const d=await api({action:"moverReserva",token,id:dragItem.id,consultorio:cons,fecha,franja:fi});
        if(!d.ok){setReservas(prev=>prev.map(x=>x.id===previous.id?previous:x));setError(d.error);fetchAll(token);}
      }catch{setReservas(prev=>prev.map(x=>x.id===previous.id?previous:x));setError("Error al mover.");fetchAll(token);}
      finally{endSync(dragItem.id);}
    } else {
      const b=bloqueos.find(x=>x.id===dragItem.id);
      if(b){
        markLocalChange();
        setBloqueos(prev=>prev.map(x=>x.id===dragItem.id?{...x,consultorio:cons,fecha,franja:fi}:x));
        showToast("Bloqueo movido");
        try{
          const d=await api({action:"moverBloqueo",token,id:b.id,consultorio:cons,fecha,franja:fi});
          if(!d.ok){
            setBloqueos(prev=>prev.map(x=>x.id===b.id?b:x));
            setError(d.error);
            fetchAll(token);
            endSync(b.id);
            setDragItem(null);
            return;
          }
          fetchAll(token);
        }catch{setBloqueos(prev=>prev.map(x=>x.id===b.id?b:x));setError("Error al mover bloqueo.");fetchAll(token);}
        finally{endSync(b.id);}
      }else{
        endSync(dragItem.id);
      }
    }
    setDragItem(null);
  };

  const MobileConsolidada=()=>{
    const d=weekDates[mobileDia]||weekDates[0];
    const fecha=dateKey(d);
    const isSat=mobileDia===5;
    const goMobileDia=delta=>setMobileDia(v=>Math.min(5,Math.max(0,v+delta)));

    const MobileCell=({ci,fi})=>{
      if(isSat&&fi>=8)return <td className="agenda-cell unavailable" style={{borderBottom:"1px solid var(--border)",borderLeft:"1px solid var(--border)"}}></td>;
      const blocked=isBlocked(ci,fecha,fi);

              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
                <div style={{fontWeight:600,fontSize:15,color:"var(--navy)"}}>Reserva</div>
                {modal.reserva.estado==="cancelada"
                  ?<span style={{fontSize:11,background:"var(--danger-bg)",color:"var(--danger)",padding:"2px 8px",borderRadius:6}}>Cancelada</span>
                  :<span style={{fontSize:11,background:"var(--success-bg)",color:"var(--success)",padding:"2px 8px",borderRadius:6}}>Confirmada</span>}
              </div>
              <div style={{...s.muted,marginBottom:12}}>{CONS[modal.reserva.consultorio]} · {modal.reserva.fecha} · {FRANJAS[modal.reserva.franja]} – {FRANJAS[modal.reserva.franja+modal.reserva.duracion/30]||"18:00"}</div>
              <div style={{fontSize:13,marginBottom:4}}><span style={{color:"var(--muted)"}}>Profesional: </span>{getUserName(modal.reserva.userId)}</div>
              {modal.reserva.tipo==="preestablecida"&&<div style={{fontSize:12,background:"var(--cyan-light)",color:"var(--navy)",padding:"3px 8px",borderRadius:6,marginBottom:8,display:"inline-block"}}>Reserva fija</div>}
              {modal.canEdit&&modal.reserva.estado!=="cancelada"?(<>
                <div style={{display:"flex",gap:8,marginTop:10,marginBottom:12}}>
                  <div style={{flex:1}}><label style={s.label}>Hora inicio</label>
                    <select value={form.franjaInicio} onChange={e=>setForm(f=>({...f,franjaInicio:e.target.value}))}>
                      {FRANJAS.map((h,i)=><option key={i} value={i}>{h}</option>)}
                    </select></div>
                  <div style={{flex:1}}><label style={s.label}>Hora fin</label>
                    <select value={form.franjaFin} onChange={e=>{setForm(f=>({...f,franjaFin:e.target.value}));setConflict(false);}}>
                      {FRANJAS.map((h,i)=><option key={i} value={i}>{h}</option>)}
                      <option value="20">18:00</option>
                    </select></div>
                </div>
                <label style={s.label}>Nota</label>
                <input value={form.nota} onChange={e=>setForm(f=>({...f,nota:e.target.value}))} style={{marginBottom:12}}/>
                {conflict&&<div style={{fontSize:12,color:"var(--danger)",marginBottom:8}}>Conflicto de horario.</div>}
                <div style={s.modalActions}>
                  {(canOperateReservations||currentUser.id===modal.reserva.userId)&&modal.reserva.estado!=="cancelada"&&<button onClick={()=>handleEstado(modal.reserva.id,"cancelada")} disabled={isSyncing(modal.reserva.id)} style={{fontSize:11,color:"var(--danger)",background:"var(--danger-bg)",border:"1px solid #f5c6c0"}}>✗ Cancelar</button>}
                  {(canOperateReservations||currentUser.id===modal.reserva.userId)&&<button onClick={()=>handleCopy("reserva",modal.reserva)} disabled={isSyncing(modal.reserva.id)} style={{fontSize:11}}>📋 Copiar</button>}
                  <button onClick={()=>setModal(null)} style={{color:"var(--muted)"}}>Cerrar</button>
                  <button onClick={handleUpdate} disabled={loading} style={{background:"var(--navy)",color:"#fff",border:"none"}}>Guardar</button>
                </div>
              </>):(<>
                <div style={{fontSize:13,marginBottom:12}}><span style={{color:"var(--muted)"}}>Nota: </span>{modal.reserva.nota||"—"}</div>
                <div style={s.modalActions}>
                  {isAdmin&&modal.reserva.estado==="cancelada"&&<button onClick={()=>handleEstado(modal.reserva.id,"confirmada")} disabled={isSyncing(modal.reserva.id)} style={{fontSize:11,color:"var(--success)",background:"var(--success-bg)",border:"1px solid #9fe1cb"}}>✓ Reconfirmar</button>}
                  {canDeleteCancelledReservations&&modal.reserva.estado==="cancelada"&&<button onClick={()=>handleDelete(modal.reserva.id)} disabled={isSyncing(modal.reserva.id)} style={{fontSize:11,color:"var(--muted)",background:"#f5f5f5",border:"1px solid #ddd"}}>🗑 Eliminar</button>}
                  {(canOperateReservations||currentUser.id===modal.reserva.userId)&&<button onClick={()=>handleCopy("reserva",modal.reserva)} disabled={isSyncing(modal.reserva.id)} style={{fontSize:11}}>📋 Copiar</button>}
                  <button onClick={()=>setModal(null)}>Cerrar</button>
                </div>
              </>)}
            </>)}
          </div>
        </div>
      )}

      {/* MODAL BLOQUEO */}
      {bloqueoModal&&(
        <div style={s.modalBackdrop}>
          <div style={{...s.modalCard,borderTop:"3px solid var(--blocked-border)"}}>
            {bloqueoModal.mode==="nuevo"&&(<>
              <div style={{fontWeight:600,fontSize:15,marginBottom:16,color:"var(--navy)"}}>🔒 Nuevo bloqueo</div>
              <label style={s.label}>Consultorio</label>
              <select value={bForm.consultorio} onChange={e=>setBForm(f=>({...f,consultorio:e.target.value}))} style={{marginBottom:12}}>
                {CONS.map((c,i)=><option key={i} value={i}>{c}</option>)}
                <option value="todos">Todos los consultorios</option>
              </select>
              <label style={s.label}>Fecha</label>
              <input type="date" value={bloqueoModal.fecha} onChange={e=>setBloqueoModal(m=>({...m,fecha:e.target.value}))} style={{marginBottom:12}}/>
              <div style={{display:"flex",gap:8,marginBottom:12}}>
                <div style={{flex:1}}><label style={s.label}>Hora inicio</label>
                  <select value={bForm.franjaInicio} onChange={e=>setBForm(f=>({...f,franjaInicio:e.target.value}))}>
                    {FRANJAS.map((h,i)=><option key={i} value={i}>{h}</option>)}
                  </select></div>
                <div style={{flex:1}}><label style={s.label}>Hora fin</label>
                  <select value={bForm.franjaFin} onChange={e=>setBForm(f=>({...f,franjaFin:e.target.value}))}>
                    {FRANJAS.map((h,i)=><option key={i} value={i}>{h}</option>)}
                    <option value="20">18:00</option>
                  </select></div>
              </div>
              <label style={s.label}>Repetición</label>
              <select value={bForm.repeticion} onChange={e=>setBForm(f=>({...f,repeticion:e.target.value}))} style={{marginBottom:12}}>
                <option value="ninguna">Sin repetición</option>
                <option value="semanal">Semanal</option>
              </select>
              <label style={s.label}>Nota (opcional)</label>
              <input value={bForm.nota} onChange={e=>setBForm(f=>({...f,nota:e.target.value}))} placeholder="Ej: Reunión, mantenimiento..." style={{marginBottom:16}}/>
              <div style={s.modalActions}>
                <button onClick={()=>setBloqueoModal(null)} style={{color:"var(--muted)"}}>Cancelar</button>
                <button onClick={handleCrearBloqueo} disabled={loading} style={{background:"#8a6500",color:"#fff",border:"none"}}>Bloquear</button>
              </div>
            </>)}
            {bloqueoModal.mode==="view"&&(<>
              <div style={{fontWeight:600,fontSize:15,marginBottom:4,color:"var(--navy)"}}>🔒 Bloqueo activo</div>
              <div style={{...s.muted,marginBottom:12}}>
                {bloqueoModal.bloqueo.consultorio==="todos"?"Todos los consultorios":CONS[bloqueoModal.bloqueo.consultorio]} · {bloqueoModal.bloqueo.fecha} · {FRANJAS[bloqueoModal.bloqueo.franja]}
              </div>
              <div style={{fontSize:13,marginBottom:4}}><span style={{color:"var(--muted)"}}>Duración: </span>{bloqueoModal.bloqueo.duracion} min</div>
              <div style={{fontSize:13,marginBottom:4}}><span style={{color:"var(--muted)"}}>Repetición: </span>{bloqueoModal.bloqueo.repeticion==="semanal"?"Semanal":"Sin repetición"}</div>
              <div style={{fontSize:13,marginBottom:16}}><span style={{color:"var(--muted)"}}>Nota: </span>{bloqueoModal.bloqueo.nota||"—"}</div>
              <div style={s.modalActions}>
                <button onClick={()=>handleCopy("bloqueo",bloqueoModal.bloqueo)} disabled={isSyncing(bloqueoModal.bloqueo.id)} style={{fontSize:11}}>📋 Copiar</button>
                <button onClick={()=>handleEliminarBloqueo(bloqueoModal.bloqueo.id)} disabled={isSyncing(bloqueoModal.bloqueo.id)} style={{color:"var(--danger)",background:"var(--danger-bg)",border:"1px solid #f5c6c0"}}>Eliminar</button>
                <button onClick={()=>setBloqueoModal(null)} style={{color:"var(--muted)"}}>Cerrar</button>
              </div>
            </>)}
          </div>
        </div>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
