<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Psiquilibrium</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{
  --navy:#1B3A6B;--cyan:#4DC8E8;--cyan-light:#e8f7fc;
  --bg:#f0f7fa;--white:#fff;--text:#1B3A6B;--muted:#5a7a9a;
  --border:#c5dce8;--danger:#c0392b;--danger-bg:#fdf0ee;
  --success:#0f6e56;--success-bg:#eafaf3;
  --blocked:#f5e6c8;--blocked-border:#c8a84b;
  --cancelled:#f0f0f0;--cancelled-text:#999;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,sans-serif;font-size:15px;background:var(--bg);color:var(--text);min-height:100vh;}
#root{max-width:1400px;margin:0 auto;padding:1rem;}
input,select{font-family:inherit;font-size:14px;padding:8px 10px;border:1px solid var(--border);border-radius:8px;width:100%;background:var(--white);color:var(--text);outline:none;}
input:focus,select:focus{border-color:var(--cyan);box-shadow:0 0 0 2px #4DC8E833;}
button{font-family:inherit;font-size:13px;padding:7px 14px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--navy);cursor:pointer;transition:background 0.15s;}
button:hover{background:var(--cyan-light);}
button:disabled{opacity:0.5;cursor:default;}
.drop-target{outline:2px dashed var(--cyan)!important;background:var(--cyan-light)!important;}
.drop-target-blocked{outline:2px dashed var(--blocked-border)!important;background:var(--blocked)!important;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useCallback,useMemo,useRef}=React;

const SCRIPT_URL="https://script.google.com/macros/s/AKfycbwtbD8VGPkhFg0nMuRW2uvIjLnLlVXclYvqRlyqgYpz_kKNLxSX2FrYCdmwW8mQhudv/exec";
const CONS=["Consultorio 1","Consultorio 2","Consultorio 3","Consultorio 4"];
const CONS_COLORS=["#1B3A6B","#0f6e56","#9B3FA0","#b07800"];
const DIAS=["Lun","Mar","Mié","Jue","Vie","Sáb"];
const DIAS_FULL=["Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
const USER_COLORS=["#1B3A6B","#2a7ab5","#0f6e56","#9B3FA0","#b07800","#c05000","#1a6b5a","#8B2252","#3a6b1B","#005a8b","#6b3a1B","#1B5a6b","#5a1B6b","#6b5a1B","#2a5298","#4a7820"];
const FRANJAS=Array.from({length:20},(_,i)=>{const h=Math.floor(8+i/2),m=i%2===0?"00":"30";return `${String(h).padStart(2,"0")}:${m}`;});
const SESSION_KEY="psiq_v6";

function getWeekDates(base){
  const d=new Date(base),diff=d.getDay()===0?-6:1-d.getDay(),mon=new Date(d);
  mon.setDate(d.getDate()+diff);
  mon.setHours(0,0,0,0);
  return Array.from({length:6},(_,i)=>{const nd=new Date(mon);nd.setDate(mon.getDate()+i);return nd;});
}
function fmt(d){return `${String(d.getDate()).padStart(2,"0")}/${String(d.getMonth()+1).padStart(2,"0")}`;}
function dateKey(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}
async function api(params){
  const u=new URL(SCRIPT_URL);
  Object.entries(params).forEach(([k,v])=>u.searchParams.set(k,String(v)));
  const res=await fetch(u.toString(),{redirect:"follow"});
  return res.json();
}

function App(){
  const [screen,setScreen]=useState("login");
  const [currentUser,setCurrentUser]=useState(null);
  const [token,setToken]=useState(null);
  const [reservas,setReservas]=useState([]);
  const [bloqueos,setBloqueos]=useState([]);
  const [allUsers,setAllUsers]=useState([]);
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState(null);
  const [toast,setToast]=useState(null);
  const [weekBase,setWeekBase]=useState(new Date());
  const [selCons,setSelCons]=useState(0);
  const [view,setView]=useState("consolidada");
  const [modal,setModal]=useState(null);
  const [bloqueoModal,setBloqueoModal]=useState(null);
  const [form,setForm]=useState({nota:"",franjaInicio:"0",franjaFin:"2",profesionalId:""});
  const [bForm,setBForm]=useState({nota:"",franjaInicio:"0",franjaFin:"2",repeticion:"ninguna",consultorio:"0"});
  const [conflict,setConflict]=useState(false);
  const [loginForm,setLoginForm]=useState({userId:"",password:""});
  const [dragItem,setDragItem]=useState(null); // {type:"reserva"|"bloqueo", id}
  const [clipboard,setClipboard]=useState(null); // {type:"reserva"|"bloqueo", item}
  const [isMobile,setIsMobile]=useState(()=>window.innerWidth<=720);
  const [mobileDia,setMobileDia]=useState(()=>Math.min(Math.max((new Date().getDay()||1)-1,0),5));
  const pollRef=useRef(null);
  const fetchInFlightKeyRef=useRef(null);
  const latestFetchKeyRef=useRef(null);
  const agendaVersionRef=useRef({key:null,version:null});
  const dataVersionRef=useRef(0);

  useEffect(()=>{
    const onResize=()=>setIsMobile(window.innerWidth<=720);
    window.addEventListener("resize",onResize);
    return()=>window.removeEventListener("resize",onResize);
  },[]);

  const weekDates=getWeekDates(weekBase);
  const weekStart=dateKey(weekDates[0]);
  const weekEnd=dateKey(weekDates[5]);
  const isAdmin=currentUser?.rol==="admin";
  const isSocio=currentUser?.rol==="socio"||isAdmin;

  const showToast=(msg,type="success")=>{setToast({msg,type});setTimeout(()=>setToast(null),3000);};
  const userMeta=useMemo(()=>{
    const names=new Map(),colors=new Map();
    allUsers.forEach((u,i)=>{names.set(u.id,u.nombre);colors.set(u.id,USER_COLORS[i%USER_COLORS.length]);});
    return {names,colors};
  },[allUsers]);
  const getUserColor=uid=>userMeta.colors.get(uid)||USER_COLORS[0];
  const getUserName=uid=>userMeta.names.get(uid)||uid;

  const slotKey=(cons,fecha,fi)=>`${cons}|${fecha}|${fi}`;
  const agendaIndex=useMemo(()=>{
    const reservaSlots=new Map();
    const bloqueoSlots=new Map();
    const weekKeys=weekDates.map(dateKey);
    const weekSet=new Set(weekKeys);
    const weekDayByFecha=new Map(weekDates.map(d=>[dateKey(d),new Date(d.getFullYear(),d.getMonth(),d.getDate()).getDay()]));

    reservas.forEach(r=>{
      if(r.fecha<weekStart||r.fecha>weekEnd)return;
      const slots=Math.ceil(Number(r.duracion||0)/30);
      for(let i=0;i<slots;i++) reservaSlots.set(slotKey(r.consultorio,r.fecha,r.franja+i),r);
    });

    bloqueos.forEach(b=>{
      const slots=Math.ceil(Number(b.duracion||0)/30);
      const addBlock=fecha=>{
        for(let i=0;i<slots;i++){
          if(b.consultorio==="todos"){
            CONS.forEach((_,ci)=>bloqueoSlots.set(slotKey(ci,fecha,b.franja+i),b));
          }else{
            bloqueoSlots.set(slotKey(b.consultorio,fecha,b.franja+i),b);
          }
        }
      };
      if(weekSet.has(b.fecha)) addBlock(b.fecha);
      if(b.repeticion==="semanal"){
        const [by,bm,bd]=b.fecha.split("-").map(Number);
        const blockDay=new Date(by,bm-1,bd).getDay();
        weekKeys.forEach(fecha=>{if(weekDayByFecha.get(fecha)===blockDay)addBlock(fecha);});
      }
    });
    return {reservaSlots,bloqueoSlots};
  },[reservas,bloqueos,weekStart,weekEnd]);

  useEffect(()=>{
    const saved=sessionStorage.getItem(SESSION_KEY);
    if(saved){try{const{user,tok,users}=JSON.parse(saved);setCurrentUser(user);setToken(tok);setAllUsers(users||[]);setScreen("app");}catch{}}
  },[]);

  const fetchAll=useCallback(async(tkn)=>{
    const activeToken=tkn||token;
    const needsFullData=view==="mis reservas"||view==="todas";
    const fetchKey=`${activeToken}|${needsFullData?"full":`${weekStart}|${weekEnd}`}`;
    if(fetchInFlightKeyRef.current===fetchKey)return;
    fetchInFlightKeyRef.current=fetchKey;
    latestFetchKeyRef.current=fetchKey;
    const dataVersionAtStart=dataVersionRef.current;
    try{
      if(!needsFullData){
        const d=await api({action:"getAgenda",token:activeToken,desde:weekStart,hasta:weekEnd});
        if(latestFetchKeyRef.current!==fetchKey)return;
        if(dataVersionRef.current!==dataVersionAtStart)return;
        if(d.ok){
          setReservas(d.reservas.map(x=>({...x,franja:Number(x.franja),duracion:Number(x.duracion),consultorio:Number(x.consultorio)})));
          setBloqueos(d.bloqueos.map(x=>({...x,franja:Number(x.franja),duracion:Number(x.duracion),consultorio:x.consultorio==="todos"?"todos":Number(x.consultorio)})));
          agendaVersionRef.current={key:fetchKey,version:d.version||null};
          return;
        }
      }
      const [r,b]=await Promise.all([api({action:"getReservas",token:activeToken}),api({action:"getBloqueos",token:activeToken})]);
      if(latestFetchKeyRef.current!==fetchKey)return;
      if(dataVersionRef.current!==dataVersionAtStart)return;
      if(r.ok) setReservas(r.reservas.map(x=>({...x,franja:Number(x.franja),duracion:Number(x.duracion),consultorio:Number(x.consultorio)})));
      if(b.ok) setBloqueos(b.bloqueos.map(x=>({...x,franja:Number(x.franja),duracion:Number(x.duracion),consultorio:x.consultorio==="todos"?"todos":Number(x.consultorio)})));
      agendaVersionRef.current={key:fetchKey,version:null};
    }catch{}finally{if(fetchInFlightKeyRef.current===fetchKey)fetchInFlightKeyRef.current=null;}
  },[token,weekStart,weekEnd,view]);

  const refreshIfNeeded=useCallback(async(tkn)=>{
    const activeToken=tkn||token;
    const needsFullData=view==="mis reservas"||view==="todas";
    if(needsFullData){fetchAll(activeToken);return;}
    const fetchKey=`${activeToken}|${weekStart}|${weekEnd}`;
    try{
      const d=await api({action:"getAgendaVersion",token:activeToken,desde:weekStart,hasta:weekEnd});
      if(!d.ok){fetchAll(activeToken);return;}
      if(agendaVersionRef.current.key!==fetchKey||agendaVersionRef.current.version!==d.version){
        fetchAll(activeToken);
      }
    }catch{fetchAll(activeToken);}
  },[token,weekStart,weekEnd,view,fetchAll]);

  useEffect(()=>{
    if(screen==="app"&&token){
      fetchAll(token);
      const pollMs=view==="mis reservas"||view==="todas"?120000:30000;
      pollRef.current=setInterval(()=>{if(!document.hidden)refreshIfNeeded(token);},pollMs);
      const onVisibilityChange=()=>{if(!document.hidden)refreshIfNeeded(token);};
      document.addEventListener("visibilitychange",onVisibilityChange);
      return()=>{
        if(pollRef.current)clearInterval(pollRef.current);
        document.removeEventListener("visibilitychange",onVisibilityChange);
      };
    }
    return()=>{if(pollRef.current)clearInterval(pollRef.current);};
  },[screen,token,fetchAll,refreshIfNeeded,view]);

  const handleLogin=async()=>{
    setError(null);setLoading(true);
    try{
      const d=await api({action:"login",userId:loginForm.userId,password:loginForm.password});
      if(d.ok){setCurrentUser(d.user);setToken(d.token);setAllUsers(d.users||[]);sessionStorage.setItem(SESSION_KEY,JSON.stringify({user:d.user,tok:d.token,users:d.users||[]}));setScreen("app");}
      else setError(d.error||"Credenciales incorrectas");
    }catch{setError("No se pudo conectar.");}
    setLoading(false);
  };

  // Helpers
  const isBlocked=(cons,fecha,fi)=>{
    return agendaIndex.bloqueoSlots.has(slotKey(cons,fecha,fi));
  };
  const getBloqueoAt=(cons,fecha,fi)=>agendaIndex.bloqueoSlots.get(slotKey(cons,fecha,fi));
  const getReserva=(cons,fecha,fi)=>agendaIndex.reservaSlots.get(slotKey(cons,fecha,fi));
  const isTempId=id=>String(id||"").startsWith("temp_");
  const markLocalChange=()=>{dataVersionRef.current+=1;return dataVersionRef.current;};
  const hasConflictLocal=(cons,fecha,fi,dur,excl=null)=>{
    const s=fi*30,e=s+dur;
    return reservas.some(r=>{
      if(r.id===excl||r.consultorio!==cons||r.fecha!==fecha||r.estado==="cancelada")return false;
      return s<r.franja*30+r.duracion&&e>r.franja*30;
    });
  };

  // CRUD reservas
  const handleSave=async()=>{
    const fi=Number(form.franjaInicio),ff=Number(form.franjaFin);
    if(ff<=fi){setConflict(true);return;}
    const dur=(ff-fi)*30;
    if(hasConflictLocal(modal.consultorio,modal.fecha,fi,dur)){setConflict(true);return;}
    const targetUserId=(isAdmin&&form.profesionalId)?form.profesionalId:currentUser.id;
    const tempId="temp_"+Date.now();
    const nueva={id:tempId,consultorio:modal.consultorio,userId:targetUserId,fecha:modal.fecha,franja:fi,duracion:dur,nota:form.nota,tipo:"normal",estado:"confirmada"};
    markLocalChange();
    setReservas(prev=>[...prev,nueva]);
    setModal(null);showToast("Reserva creada");
    try{
      const d=await api({action:"crearReserva",token,consultorio:modal.consultorio,fecha:modal.fecha,franja:fi,duracion:dur,nota:form.nota,targetUserId});
      if(d.ok){setReservas(prev=>prev.map(r=>r.id===tempId?{...r,id:d.id}:r));fetchAll(token);}
      else{setError(d.error);setReservas(prev=>prev.filter(r=>r.id!==tempId));}
    }catch{setError("Error al guardar.");setReservas(prev=>prev.filter(r=>r.id!==tempId));}
  };
  const handleUpdate=async()=>{
    const fi=Number(form.franjaInicio),ff=Number(form.franjaFin);
    if(ff<=fi){setConflict(true);return;}
    const dur=(ff-fi)*30;
    if(hasConflictLocal(modal.consultorio,modal.fecha,fi,dur,modal.reserva.id)){setConflict(true);return;}
    markLocalChange();
    setReservas(prev=>prev.map(r=>r.id===modal.reserva.id?{...r,duracion:dur,nota:form.nota}:r));
    setModal(null);showToast("Reserva actualizada");
    try{
      const d=await api({action:"editarReserva",token,id:modal.reserva.id,duracion:dur,nota:form.nota});
      if(!d.ok){setError(d.error);fetchAll(token);}
    }catch{setError("Error al actualizar.");fetchAll(token);}
  };
  const handleEstado=async(id,estado)=>{
    if(isTempId(id)){setError("La reserva aún se está sincronizando. Intenta de nuevo en unos segundos.");fetchAll(token);return;}
    const previous=reservas.find(r=>r.id===id);
    markLocalChange();
    setReservas(prev=>prev.map(r=>r.id===id?{...r,estado}:r));
    setModal(null);
    showToast(estado==="cancelada"?"Cancelada":"Confirmada",estado==="cancelada"?"danger":"success");
    try{
      const d=await api({action:"cambiarEstado",token,id,estado});
      if(d.ok) fetchAll(token);
      else{if(previous)setReservas(prev=>prev.map(r=>r.id===id?previous:r));setError(d.error);fetchAll(token);}
    }catch{if(previous)setReservas(prev=>prev.map(r=>r.id===id?previous:r));setError("Error.");fetchAll(token);}
  };
  const handleDelete=async(id)=>{
    if(isTempId(id)){setError("La reserva aún se está sincronizando. Intenta de nuevo en unos segundos.");fetchAll(token);return;}
    const previous=reservas.find(r=>r.id===id);
    markLocalChange();
    setReservas(prev=>prev.filter(r=>r.id!==id));
    setModal(null);
    showToast("Eliminada","danger");
    try{
      const d=await api({action:"eliminarReserva",token,id});
      if(d.ok) fetchAll(token);
      else{if(previous)setReservas(prev=>prev.some(r=>r.id===id)?prev:[...prev,previous]);setError(d.error);fetchAll(token);}
    }catch{if(previous)setReservas(prev=>prev.some(r=>r.id===id)?prev:[...prev,previous]);setError("Error.");fetchAll(token);}
  };

  // Drag & drop
  const onDragStart=(e,type,id)=>{setDragItem({type,id});e.dataTransfer.effectAllowed="move";};
  const onDragOver=e=>{e.preventDefault();const cls=dragItem?.type==="bloqueo"?"drop-target-blocked":"drop-target";e.currentTarget.classList.add(cls);};
  const onDragLeave=e=>{e.currentTarget.classList.remove("drop-target","drop-target-blocked");};
  const onDrop=async(e,cons,fecha,fi)=>{
    e.preventDefault();e.currentTarget.classList.remove("drop-target","drop-target-blocked");
    if(!dragItem)return;
    if(isTempId(dragItem.id)){setError("Este elemento aún se está sincronizando. Intenta de nuevo en unos segundos.");setDragItem(null);fetchAll(token);return;}
    if(dragItem.type==="reserva"){
      const r=reservas.find(x=>x.id===dragItem.id);
      if(!r||r.consultorio===cons&&r.fecha===fecha&&r.franja===fi){setDragItem(null);return;}
      // Optimista
      markLocalChange();
      setReservas(prev=>prev.map(x=>x.id===dragItem.id?{...x,consultorio:cons,fecha,franja:fi}:x));
      showToast("Reserva movida");
      try{
        const d=await api({action:"moverReserva",token,id:dragItem.id,consultorio:cons,fecha,franja:fi});
        if(!d.ok){setError(d.error);fetchAll(token);}
      }catch{setError("Error al mover.");fetchAll(token);}
    } else {
      const b=bloqueos.find(x=>x.id===dragItem.id);
      if(b){
        markLocalChange();
        setBloqueos(prev=>prev.map(x=>x.id===dragItem.id?{...x,consultorio:cons,fecha,franja:fi}:x));
        showToast("Bloqueo movido");
        try{
          const d=await api({action:"moverBloqueo",token,id:b.id,consultorio:cons,fecha,franja:fi});
          if(!d.ok){
            setBloqueos(prev=>prev.map(x=>x.id===b.id?b:x));
            setError(d.error);
            fetchAll(token);
            setDragItem(null);
            return;
          }
          fetchAll(token);
        }catch{setError("Error al mover bloqueo.");fetchAll(token);}
      }
    }
    setDragItem(null);
  };

  // Copiar/pegar
  const handleCopy=(type,item)=>{
    if(isTempId(item?.id)){setError("Este elemento aún se está sincronizando. Intenta de nuevo en unos segundos.");fetchAll(token);return;}
    setClipboard({type,item});showToast(`${type==="bloqueo"?"Bloqueo":"Reserva"} copiado — clic en celda destino`);
  };
  const handlePaste=async(cons,fecha,fi)=>{
    if(!clipboard)return;
    if(isTempId(clipboard.item?.id)){setClipboard(null);setError("El elemento copiado aún se estaba sincronizando. Intenta copiarlo de nuevo.");fetchAll(token);return;}
    setLoading(true);
    try{
      if(clipboard.type==="reserva"){
        const d=await api({action:"copiarReserva",token,id:clipboard.item.id,consultorio:cons,fecha,franja:fi});
        if(d.ok){await fetchAll(token);setClipboard(null);showToast("Reserva pegada");}else setError(d.error);
      } else {
        const b=clipboard.item;
        const d=await api({action:"crearBloqueo",token,consultorio:cons,fecha,franja:fi,duracion:b.duracion,nota:b.nota,repeticion:b.repeticion});
        if(d.ok){await fetchAll(token);setClipboard(null);showToast("Bloqueo pegado");}else setError(d.error);
      }
    }catch{setError("Error al pegar.");}
    setLoading(false);
  };

  // Bloqueos
  const handleCrearBloqueo=async()=>{
    const fi=Number(bForm.franjaInicio),ff=Number(bForm.franjaFin);
    if(ff<=fi)return;
    const dur=(ff-fi)*30;
    const tempId="temp_b_"+Date.now();
    const nuevo={id:tempId,consultorio:bForm.consultorio==="todos"?"todos":Number(bForm.consultorio),fecha:bloqueoModal.fecha,franja:fi,duracion:dur,nota:bForm.nota,repeticion:bForm.repeticion};
    markLocalChange();
    setBloqueos(prev=>[...prev,nuevo]);
    setBloqueoModal(null);
    showToast("Bloqueo creado");
    try{
      const d=await api({action:"crearBloqueo",token,consultorio:bForm.consultorio,fecha:bloqueoModal.fecha,franja:fi,duracion:dur,nota:bForm.nota,repeticion:bForm.repeticion});
      if(d.ok){setBloqueos(prev=>prev.map(b=>b.id===tempId?{...b,id:d.id}:b));fetchAll(token);}
      else{setBloqueos(prev=>prev.filter(b=>b.id!==tempId));setError(d.error);fetchAll(token);}
    }catch{setBloqueos(prev=>prev.filter(b=>b.id!==tempId));setError("Error.");fetchAll(token);}
  };
  const handleEliminarBloqueo=async(id)=>{
    if(isTempId(id)){setError("El bloqueo aún se está sincronizando. Intenta de nuevo en unos segundos.");fetchAll(token);return;}
    const previous=bloqueos.find(b=>b.id===id);
    markLocalChange();
    setBloqueos(prev=>prev.filter(b=>b.id!==id));
    setBloqueoModal(null);
    showToast("Bloqueo eliminado","danger");
    try{
      const d=await api({action:"eliminarBloqueo",token,id});
      if(d.ok) fetchAll(token);
      else{if(previous)setBloqueos(prev=>prev.some(b=>b.id===id)?prev:[...prev,previous]);setError(d.error);fetchAll(token);}
    }catch{if(previous)setBloqueos(prev=>prev.some(b=>b.id===id)?prev:[...prev,previous]);setError("Error.");fetchAll(token);}
  };

  const openCell=(cons,fecha,fi)=>{
    if(clipboard){handlePaste(cons,fecha,fi);return;}
    const bloqueo=getBloqueoAt(cons,fecha,fi);
    if(bloqueo){if(isAdmin)setBloqueoModal({mode:"view",bloqueo});return;}
    const r=getReserva(cons,fecha,fi);
    if(r){
      const canEdit=isAdmin||currentUser.id===r.userId;
      setModal({mode:"view",reserva:r,canEdit,consultorio:cons,fecha,franja:fi});
      setForm({nota:r.nota,franjaInicio:String(r.franja),franjaFin:String(r.franja+r.duracion/30),profesionalId:""});
      setConflict(false);
    } else {
      if(isBlocked(cons,fecha,fi))return;
      if(isSocio&&!isAdmin)return;

      {view==="mis reservas"&&(
        <div>
          <div style={{fontWeight:600,marginBottom:12,fontSize:14,color:"var(--navy)"}}>Mis reservas</div>
          {misReservas.length===0&&<p style={s.muted}>No tienes reservas registradas.</p>}
          {misReservas.map(r=>{
            const cancelled=r.estado==="cancelada";
            return(
              <div key={r.id} style={{...s.card,marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center",borderLeft:`3px solid ${cancelled?"#ccc":getUserColor(r.userId)}`,opacity:cancelled?0.7:1}}>
                <div>
                  <div style={{fontWeight:600,fontSize:13,color:"var(--navy)",textDecoration:cancelled?"line-through":"none"}}>{CONS[r.consultorio]} · {FRANJAS[r.franja]} – {FRANJAS[r.franja+r.duracion/30]||"18:00"}</div>
                  <div style={s.muted}>{r.fecha}{r.nota?` · ${r.nota}`:""}{cancelled?" · CANCELADA":""}{r.tipo==="preestablecida"?" · (fija)":""}</div>
                </div>
                <div style={{display:"flex",gap:6,flexShrink:0}}>
                  {!cancelled&&<button onClick={()=>handleEstado(r.id,"cancelada")} style={{fontSize:11,color:"var(--danger)",background:"var(--danger-bg)",border:"1px solid #f5c6c0"}}>✗ Cancelar</button>}
                  {cancelled&&<button onClick={()=>handleDelete(r.id)} style={{fontSize:11,color:"var(--muted)",background:"#f5f5f5",border:"1px solid #ddd"}}>🗑 Eliminar</button>}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* ── TODAS ── */}
      {view==="todas"&&isSocio&&(
        <div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:8}}>
            <div style={{fontWeight:600,fontSize:14,color:"var(--navy)"}}>Todas las reservas ({todasReservas.length})</div>
            {isAdmin&&<button onClick={async()=>{setLoading(true);try{const d=await api({action:"generarPreestablecidas",token});if(d.ok){await fetchAll(token);showToast(`${d.creadas} reservas fijas generadas`);}else setError(d.error);}catch{setError("Error.");}setLoading(false);}} style={{fontSize:12,background:"var(--cyan-light)",color:"var(--navy)"}}>⚡ Generar reservas fijas</button>}
          </div>
          {todasReservas.map(r=>{
            const u=allUsers.find(x=>x.id===r.userId);const color=getUserColor(r.userId);const cancelled=r.estado==="cancelada";
            return(
              <div key={r.id} style={{...s.card,borderLeft:`3px solid ${cancelled?"#ccc":color}`,marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center",opacity:cancelled?0.7:1}}>
                <div style={{flex:1}}>
                  <div style={{fontWeight:600,fontSize:13,color:"var(--navy)",textDecoration:cancelled?"line-through":"none"}}>{CONS[r.consultorio]} · {FRANJAS[r.franja]} – {FRANJAS[r.franja+r.duracion/30]||"18:00"}</div>
                  <div style={s.muted}>{r.fecha} · {u?.nombre||r.userId}{r.nota?` · ${r.nota}`:""}{r.tipo==="preestablecida"?" · (fija)":""}{cancelled?" · CANCELADA":""}</div>
                </div>
                <div style={{display:"flex",gap:6,flexShrink:0}}>
                  {isAdmin&&!cancelled&&<button onClick={()=>handleEstado(r.id,"cancelada")} style={{fontSize:11,color:"var(--danger)",background:"var(--danger-bg)",border:"1px solid #f5c6c0"}}>✗</button>}
                  {isAdmin&&cancelled&&<button onClick={()=>handleEstado(r.id,"confirmada")} style={{fontSize:11,color:"var(--success)",background:"var(--success-bg)",border:"1px solid #9fe1cb"}}>✓</button>}
                  {isAdmin&&cancelled&&<button onClick={()=>handleDelete(r.id)} style={{fontSize:11,color:"var(--muted)",background:"#f5f5f5",border:"1px solid #ddd"}}>🗑</button>}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* MODAL RESERVA */}
      {modal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.35)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:16}}>
          <div style={{...s.card,width:"100%",maxWidth:420}}>
            {modal.mode==="nueva"&&(<>
              <div style={{fontWeight:600,fontSize:15,marginBottom:4,color:"var(--navy)"}}>Nueva reserva</div>
              <div style={{...s.muted,marginBottom:16}}>{CONS[modal.consultorio]} · {DIAS_FULL[weekDates.findIndex(d=>dateKey(d)===modal.fecha)]||modal.fecha}</div>
              {isAdmin&&(<><label style={s.label}>Profesional</label>
                <select value={form.profesionalId} onChange={e=>setForm(f=>({...f,profesionalId:e.target.value}))} style={{marginBottom:12}}>
                  <option value="">— Seleccionar —</option>
                  {profesionales.map(u=><option key={u.id} value={u.id}>{u.nombre}</option>)}
                </select></>)}
              <div style={{display:"flex",gap:8,marginBottom:12}}>
                <div style={{flex:1}}><label style={s.label}>Hora inicio</label>
                  <select value={form.franjaInicio} onChange={e=>setForm(f=>({...f,franjaInicio:e.target.value}))}>
                    {FRANJAS.map((h,i)=><option key={i} value={i}>{h}</option>)}
                  </select></div>
                <div style={{flex:1}}><label style={s.label}>Hora fin</label>
                  <select value={form.franjaFin} onChange={e=>{setForm(f=>({...f,franjaFin:e.target.value}));setConflict(false);}}>
                    {FRANJAS.map((h,i)=><option key={i} value={i}>{h}</option>)}
                    <option value="20">18:00</option>
                  </select></div>
              </div>
              <label style={s.label}>Nota (opcional)</label>
              <input value={form.nota} onChange={e=>setForm(f=>({...f,nota:e.target.value}))} placeholder="Nombre paciente, tipo de consulta..." style={{marginBottom:16}}/>
              {conflict&&<div style={{fontSize:12,color:"var(--danger)",marginBottom:8}}>Hora fin debe ser mayor que inicio, o hay conflicto.</div>}
              <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
                <button onClick={()=>setModal(null)} style={{color:"var(--muted)"}}>Cancelar</button>
                <button onClick={handleSave} disabled={loading||(isAdmin&&!form.profesionalId)} style={{background:"var(--navy)",color:"#fff",border:"none"}}>Reservar</button>
              </div>
            </>)}
            {modal.mode==="view"&&(<>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
                <div style={{fontWeight:600,fontSize:15,color:"var(--navy)"}}>Reserva</div>
                {modal.reserva.estado==="cancelada"
                  ?<span style={{fontSize:11,background:"var(--danger-bg)",color:"var(--danger)",padding:"2px 8px",borderRadius:6}}>Cancelada</span>
                  :<span style={{fontSize:11,background:"var(--success-bg)",color:"var(--success)",padding:"2px 8px",borderRadius:6}}>Confirmada</span>}
              </div>
              <div style={{...s.muted,marginBottom:12}}>{CONS[modal.reserva.consultorio]} · {modal.reserva.fecha} · {FRANJAS[modal.reserva.franja]} – {FRANJAS[modal.reserva.franja+modal.reserva.duracion/30]||"18:00"}</div>
              <div style={{fontSize:13,marginBottom:4}}><span style={{color:"var(--muted)"}}>Profesional: </span>{getUserName(modal.reserva.userId)}</div>
              {modal.reserva.tipo==="preestablecida"&&<div style={{fontSize:12,background:"var(--cyan-light)",color:"var(--navy)",padding:"3px 8px",borderRadius:6,marginBottom:8,display:"inline-block"}}>Reserva fija</div>}
              {modal.canEdit&&modal.reserva.estado!=="cancelada"?(<>
                <div style={{display:"flex",gap:8,marginTop:10,marginBottom:12}}>
                  <div style={{flex:1}}><label style={s.label}>Hora inicio</label>
                    <select value={form.franjaInicio} onChange={e=>setForm(f=>({...f,franjaInicio:e.target.value}))}>
                      {FRANJAS.map((h,i)=><option key={i} value={i}>{h}</option>)}
                    </select></div>
                  <div style={{flex:1}}><label style={s.label}>Hora fin</label>
                    <select value={form.franjaFin} onChange={e=>{setForm(f=>({...f,franjaFin:e.target.value}));setConflict(false);}}>
                      {FRANJAS.map((h,i)=><option key={i} value={i}>{h}</option>)}
                      <option value="20">18:00</option>
                    </select></div>
                </div>
                <label style={s.label}>Nota</label>
                <input value={form.nota} onChange={e=>setForm(f=>({...f,nota:e.target.value}))} style={{marginBottom:12}}/>
                {conflict&&<div style={{fontSize:12,color:"var(--danger)",marginBottom:8}}>Conflicto de horario.</div>}
                <div style={{display:"flex",gap:6,justifyContent:"flex-end",flexWrap:"wrap"}}>
                  {(isAdmin||currentUser.id===modal.reserva.userId)&&modal.reserva.estado!=="cancelada"&&<button onClick={()=>handleEstado(modal.reserva.id,"cancelada")} style={{fontSize:11,color:"var(--danger)",background:"var(--danger-bg)",border:"1px solid #f5c6c0"}}>✗ Cancelar</button>}
                  <button onClick={()=>handleCopy("reserva",modal.reserva)} style={{fontSize:11}}>📋 Copiar</button>
                  <button onClick={()=>setModal(null)} style={{color:"var(--muted)"}}>Cerrar</button>
                  <button onClick={handleUpdate} disabled={loading} style={{background:"var(--navy)",color:"#fff",border:"none"}}>Guardar</button>
                </div>
              </>):(<>
                <div style={{fontSize:13,marginBottom:12}}><span style={{color:"var(--muted)"}}>Nota: </span>{modal.reserva.nota||"—"}</div>
                <div style={{display:"flex",gap:6,justifyContent:"flex-end",flexWrap:"wrap"}}>
                  {isAdmin&&modal.reserva.estado==="cancelada"&&<button onClick={()=>handleEstado(modal.reserva.id,"confirmada")} style={{fontSize:11,color:"var(--success)",background:"var(--success-bg)",border:"1px solid #9fe1cb"}}>✓ Reconfirmar</button>}
                  {isAdmin&&modal.reserva.estado==="cancelada"&&<button onClick={()=>handleDelete(modal.reserva.id)} style={{fontSize:11,color:"var(--muted)",background:"#f5f5f5",border:"1px solid #ddd"}}>🗑 Eliminar</button>}
                  <button onClick={()=>handleCopy("reserva",modal.reserva)} style={{fontSize:11}}>📋 Copiar</button>
                  <button onClick={()=>setModal(null)}>Cerrar</button>
                </div>
              </>)}
            </>)}
          </div>
        </div>
      )}

      {/* MODAL BLOQUEO */}
      {bloqueoModal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.35)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:16}}>
          <div style={{...s.card,width:"100%",maxWidth:420,borderTop:"3px solid var(--blocked-border)"}}>
            {bloqueoModal.mode==="nuevo"&&(<>
              <div style={{fontWeight:600,fontSize:15,marginBottom:16,color:"var(--navy)"}}>🔒 Nuevo bloqueo</div>
              <label style={s.label}>Consultorio</label>
              <select value={bForm.consultorio} onChange={e=>setBForm(f=>({...f,consultorio:e.target.value}))} style={{marginBottom:12}}>
                {CONS.map((c,i)=><option key={i} value={i}>{c}</option>)}
                <option value="todos">Todos los consultorios</option>
              </select>
              <label style={s.label}>Fecha</label>
              <input type="date" value={bloqueoModal.fecha} onChange={e=>setBloqueoModal(m=>({...m,fecha:e.target.value}))} style={{marginBottom:12}}/>
              <div style={{display:"flex",gap:8,marginBottom:12}}>
                <div style={{flex:1}}><label style={s.label}>Hora inicio</label>
                  <select value={bForm.franjaInicio} onChange={e=>setBForm(f=>({...f,franjaInicio:e.target.value}))}>
                    {FRANJAS.map((h,i)=><option key={i} value={i}>{h}</option>)}
                  </select></div>
                <div style={{flex:1}}><label style={s.label}>Hora fin</label>
                  <select value={bForm.franjaFin} onChange={e=>setBForm(f=>({...f,franjaFin:e.target.value}))}>
                    {FRANJAS.map((h,i)=><option key={i} value={i}>{h}</option>)}
                    <option value="20">18:00</option>
                  </select></div>
              </div>
              <label style={s.label}>Repetición</label>
              <select value={bForm.repeticion} onChange={e=>setBForm(f=>({...f,repeticion:e.target.value}))} style={{marginBottom:12}}>
                <option value="ninguna">Sin repetición</option>
                <option value="semanal">Semanal</option>
              </select>
              <label style={s.label}>Nota (opcional)</label>
              <input value={bForm.nota} onChange={e=>setBForm(f=>({...f,nota:e.target.value}))} placeholder="Ej: Reunión, mantenimiento..." style={{marginBottom:16}}/>
              <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
                <button onClick={()=>setBloqueoModal(null)} style={{color:"var(--muted)"}}>Cancelar</button>
                <button onClick={handleCrearBloqueo} disabled={loading} style={{background:"#8a6500",color:"#fff",border:"none"}}>Bloquear</button>
              </div>
            </>)}
            {bloqueoModal.mode==="view"&&(<>
              <div style={{fontWeight:600,fontSize:15,marginBottom:4,color:"var(--navy)"}}>🔒 Bloqueo activo</div>
              <div style={{...s.muted,marginBottom:12}}>
                {bloqueoModal.bloqueo.consultorio==="todos"?"Todos los consultorios":CONS[bloqueoModal.bloqueo.consultorio]} · {bloqueoModal.bloqueo.fecha} · {FRANJAS[bloqueoModal.bloqueo.franja]}
              </div>
              <div style={{fontSize:13,marginBottom:4}}><span style={{color:"var(--muted)"}}>Duración: </span>{bloqueoModal.bloqueo.duracion} min</div>
              <div style={{fontSize:13,marginBottom:4}}><span style={{color:"var(--muted)"}}>Repetición: </span>{bloqueoModal.bloqueo.repeticion==="semanal"?"Semanal":"Sin repetición"}</div>
              <div style={{fontSize:13,marginBottom:16}}><span style={{color:"var(--muted)"}}>Nota: </span>{bloqueoModal.bloqueo.nota||"—"}</div>
              <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
                <button onClick={()=>handleCopy("bloqueo",bloqueoModal.bloqueo)} style={{fontSize:11}}>📋 Copiar</button>
                <button onClick={()=>handleEliminarBloqueo(bloqueoModal.bloqueo.id)} style={{color:"var(--danger)",background:"var(--danger-bg)",border:"1px solid #f5c6c0"}}>Eliminar</button>
                <button onClick={()=>setBloqueoModal(null)} style={{color:"var(--muted)"}}>Cerrar</button>
              </div>
            </>)}
          </div>
        </div>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
